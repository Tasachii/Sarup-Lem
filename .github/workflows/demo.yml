name: Deploy demo to GitHub Pages

# Publishes the static, client-only demo in /demo to GitHub Pages.
# Pages serves only static files — the real app (Next.js + Claude API streaming)
# still needs a Node host with ANTHROPIC_API_KEY set (see README). This is the public "Live demo" link.

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - ".github/workflows/demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; don't cancel an in-progress release
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./demo
      - id: deployment
        uses: actions/deploy-pages@v4
